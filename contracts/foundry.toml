[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 1_000_000
via_ir           = false

# Mainnet fork for tests — override with FOUNDRY_ETH_RPC_URL env var
eth_rpc_url = "${FOUNDRY_ETH_RPC_URL}"

[rpc_endpoints]
mainnet = "${FOUNDRY_ETH_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
